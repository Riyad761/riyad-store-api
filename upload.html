<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riyad Store Upload Panel</title>

    <link rel="stylesheet" href="upload.css">
</head>

<body>

    <div class="container">

        <h2>🚀 Riyad Store Upload Panel</h2>

        <input
            type="text"
            id="name"
            placeholder="Command Name">

        <input
            type="text"
            id="author"
            placeholder="Author Name">

        <input
            type="text"
            id="category"
            placeholder="Category">

        <input
            type="text"
            id="version"
            value="1.0.0">

        <textarea
            id="description"
            placeholder="Description"></textarea>

        <input
            type="file"
            id="file"
            accept=".js">

        <button onclick="upload()">
            Upload Command
        </button>

        <div id="result"></div>

    </div>

    <script src="upload.js"></script>

</body>

</html>
